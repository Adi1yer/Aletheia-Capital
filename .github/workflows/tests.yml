name: Unit tests

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry && poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run pytest
        run: poetry run pytest -q

      - name: Golden determinism hash gate
        run: poetry run pytest -q tests/test_phase11_determinism.py::test_golden_run_decision_hash_stable

      - name: Build operator cockpit artifact
        run: poetry run python scripts/operator_cockpit.py

      - name: Ops orchestrator smoke
        run: poetry run python scripts/ops_orchestrator.py --stage cockpit,slo,gonogo
