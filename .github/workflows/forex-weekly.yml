name: Forex Weekly

# IBKR sleeve disabled in config/workflow_accounts.yaml — manual dispatch only.
on:
  workflow_dispatch:

jobs:
  forex:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install poetry && poetry config virtualenvs.in-project true
      - run: poetry install --no-interaction --no-ansi
      - name: Restore forex data
        uses: actions/cache/restore@v4
        with:
          path: data/forex
          key: forex-data-${{ github.repository }}-main
          restore-keys: forex-data-${{ github.repository }}-
      - name: Run forex scan
        env:
          FOREX_IBKR_ACCOUNT_ID: ${{ secrets.FOREX_IBKR_ACCOUNT_ID }}
          IBKR_GATEWAY_HOST: ${{ secrets.IBKR_GATEWAY_HOST }}
          IBKR_GATEWAY_PORT: ${{ secrets.IBKR_GATEWAY_PORT }}
        run: poetry run python forex_scan.py
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: data/forex
          key: forex-data-${{ github.repository }}-main
