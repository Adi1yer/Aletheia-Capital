name: Weekly Scan & Rebalance

on:
  schedule:
    # 16:00 UTC = ~9:00 AM Pacific during PDT
    - cron: '0 16 * * 1'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  weekly-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          pip install poetry
          poetry config virtualenvs.in-project true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Restore performance data (learning files)
        uses: actions/cache/restore@v4
        id: perf_cache_restore
        with:
          path: data/performance
          key: perf-${{ github.repository }}-main
          restore-keys: |
            perf-${{ github.repository }}-

      - name: Restore scan run cache
        uses: actions/cache/restore@v4
        id: scan_cache_restore
        with:
          path: data/scan_cache
          key: scan-${{ github.repository }}-main
          restore-keys: |
            scan-${{ github.repository }}-

      - name: Cache restore diagnostics
        run: |
          mkdir -p data/performance data/scan_cache
          echo "performance cache hit: ${{ steps.perf_cache_restore.outputs.cache-hit }}"
          echo "scan cache hit: ${{ steps.scan_cache_restore.outputs.cache-hit }}"
          echo "S3 scan cache bucket: ${SCAN_CACHE_S3_BUCKET:-not set}"
          echo "S3 scan cache prefix: ${SCAN_CACHE_S3_PREFIX:-not set}"
          echo "performance files:" && ls -la data/performance/ 2>/dev/null || true
          echo "weekly_ledger lines:" && wc -l data/performance/weekly_ledger.jsonl 2>/dev/null || echo 0
          echo "scan_cache run dirs:" && ls data/scan_cache/ 2>/dev/null | wc -l
        env:
          SCAN_CACHE_S3_BUCKET: ${{ secrets.SCAN_CACHE_S3_BUCKET }}
          SCAN_CACHE_S3_PREFIX: ${{ secrets.SCAN_CACHE_S3_PREFIX }}

      - name: Preflight checks
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        run: poetry run python preflight.py --skip-biotech

      - name: Run weekly scan & rebalance
        env:
          SCAN_CACHE_KEEP_WEEKS: "26"
          CACHE_HIT_PERFORMANCE: ${{ steps.perf_cache_restore.outputs.cache-hit }}
          CACHE_HIT_SCAN: ${{ steps.scan_cache_restore.outputs.cache-hit }}
          SCAN_CACHE_S3_BUCKET: ${{ secrets.SCAN_CACHE_S3_BUCKET }}
          SCAN_CACHE_S3_PREFIX: ${{ secrets.SCAN_CACHE_S3_PREFIX }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          poetry run python weekly_scan_rebalancing.py \
            --run-profile ci-full \
            --agent-tier-mode tiered \
            --max-stocks 500 \
            --stop-loss-pct 0.08 \
            --enable-covered-calls \
            --execute \
            --enable-cash-rotation --cash-rotation-min-edge 12 \
            --max-cash-rotation-sells 3 \
            --enable-cash-secured-puts --min-csp-score 45 --max-csp-tickers 2 --max-csp-collateral-pct 0.10 \
            --min-csp-premium-usd 75 --min-csp-annualized-yield-pct 3.0 \
            --max-position-pct 0.20 --max-sector-pct 0.35 \
            --regime-mode auto \
            --use-portfolio-optimizer

      - name: Post-run ops orchestrator
        if: always()
        run: poetry run python scripts/ops_orchestrator.py --stage cockpit,slo,gonogo --strict

      - name: Upload weekly run summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-run-summary-${{ github.run_id }}
          retention-days: 7
          path: |
            data/performance/
            data/scan_cache/**/meta.json
            data/scan_cache/**/decisions.json
            data/scan_cache/**/execution_results.json
            data/performance/operator_cockpit_latest.json
            data/performance/ops_orchestrator_latest.json
          if-no-files-found: ignore

      - name: Save performance data
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/performance
          key: perf-${{ github.repository }}-main

      - name: Save scan run cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/scan_cache
          key: scan-${{ github.repository }}-main
