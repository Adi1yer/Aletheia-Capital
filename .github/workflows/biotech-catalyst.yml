name: Biotech Catalyst Scan

on:
  schedule:
    # Same as weekly stock scan: 16:00 UTC (~9:00 AM Pacific during PDT)
    - cron: "0 16 * * 1"
  workflow_dispatch:
    inputs:
      tickers:
        description: Optional comma-separated tickers (leave empty to use watchlist / BIOTECH_TICKERS)
        required: false
        default: ""
      from_watchlist:
        description: "true to force watchlist mode instead of catalyst-first discovery"
        required: false
        default: "false"
      dry_run:
        description: "true to skip Alpaca paper execution (analysis only)"
        required: false
        default: "false"
      skip_readout_filter:
        description: "true to analyze all tickers even without a trial in the readout window (not recommended)"
        required: false
        default: "false"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: |
          pip install poetry
          poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run biotech catalyst scan
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BIOTECH_ALPACA_API_KEY: ${{ secrets.BIOTECH_ALPACA_API_KEY }}
          BIOTECH_ALPACA_SECRET_KEY: ${{ secrets.BIOTECH_ALPACA_SECRET_KEY }}
          BIOTECH_TICKERS: ${{ secrets.BIOTECH_TICKERS }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          BIOTECH_RECIPIENT_EMAIL: ${{ secrets.BIOTECH_RECIPIENT_EMAIL }}
        run: |
          set -e
          if [ "${{ github.event_name }}" = "schedule" ]; then
            poetry run python biotech_catalyst_scan.py --discover-candidates
            exit 0
          fi
          T="${{ github.event.inputs.tickers }}"
          FW="${{ github.event.inputs.from_watchlist }}"
          DRY="${{ github.event.inputs.dry_run }}"
          SF="${{ github.event.inputs.skip_readout_filter }}"
          if [ -n "$T" ]; then
            ARGS=(--tickers "$T")
          elif [ "$FW" = "true" ]; then
            ARGS=(--from-watchlist)
          else
            ARGS=(--discover-candidates)
          fi
          if [ "$DRY" = "true" ]; then
            ARGS+=(--no-paper-execute)
          fi
          if [ "$SF" = "true" ]; then
            ARGS+=(--skip-readout-filter)
          fi
          poetry run python biotech_catalyst_scan.py "${ARGS[@]}"
