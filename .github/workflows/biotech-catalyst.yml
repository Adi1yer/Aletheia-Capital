name: Biotech Catalyst Scan

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: Comma-separated tickers (e.g. MRNA,VRTX)
        required: true
        default: "MRNA"
      paper_execute:
        description: "true to run paper straddle execution (requires biotech Alpaca secrets)"
        required: false
        default: "false"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          pip install poetry
          poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run biotech catalyst scan
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BIOTECH_ALPACA_API_KEY: ${{ secrets.BIOTECH_ALPACA_API_KEY }}
          BIOTECH_ALPACA_SECRET_KEY: ${{ secrets.BIOTECH_ALPACA_SECRET_KEY }}
        run: |
          PE="${{ github.event.inputs.paper_execute }}"
          if [ "$PE" = "true" ]; then
            poetry run python biotech_catalyst_scan.py --tickers "${{ github.event.inputs.tickers }}" --paper-execute
          else
            poetry run python biotech_catalyst_scan.py --tickers "${{ github.event.inputs.tickers }}"
          fi
