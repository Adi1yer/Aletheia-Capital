name: Fund Weekly Digest

on:
  schedule:
    - cron: "0 18 * * 1"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install poetry && poetry config virtualenvs.in-project true
      - run: poetry install --no-interaction --no-ansi

      - name: Restore satellite sleeve data
        uses: actions/cache/restore@v4
        id: satellite_data_restore
        with:
          path: |
            data/hedge
            data/options_income
            data/congressional
            data/macro_etf
            data/crypto
            data/fund
            data/daily_snapshots/multi_sleeve
          key: satellite-data-${{ github.repository }}-main
          restore-keys: |
            satellite-data-${{ github.repository }}-

      - name: Restore daily snapshots (fallback)
        uses: actions/cache/restore@v4
        with:
          path: data/daily_snapshots
          key: daily-snapshots-${{ github.repository }}-main
          restore-keys: |
            daily-snapshots-${{ github.repository }}-

      - name: Preflight checks
        env:
          MULTI_SLEEVE_ALPACA_API_KEY: ${{ secrets.MULTI_SLEEVE_ALPACA_API_KEY }}
          MULTI_SLEEVE_ALPACA_API_SECRET_KEY: ${{ secrets.MULTI_SLEEVE_ALPACA_API_SECRET_KEY }}
          MULTI_SLEEVE_ALPACA_SECRET_KEY: ${{ secrets.MULTI_SLEEVE_ALPACA_API_SECRET_KEY }}
          HEDGE_ALPACA_API_KEY: ${{ secrets.HEDGE_ALPACA_API_KEY }}
          HEDGE_ALPACA_SECRET_KEY: ${{ secrets.HEDGE_ALPACA_SECRET_KEY }}
          HEDGE_ALPACA_API_SECRET_KEY: ${{ secrets.HEDGE_ALPACA_SECRET_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        run: poetry run python preflight.py --satellite-only --skip-deepseek --skip-finnhub

      - name: Send fund weekly digest
        env:
          MULTI_SLEEVE_ALPACA_API_KEY: ${{ secrets.MULTI_SLEEVE_ALPACA_API_KEY }}
          MULTI_SLEEVE_ALPACA_API_SECRET_KEY: ${{ secrets.MULTI_SLEEVE_ALPACA_API_SECRET_KEY }}
          MULTI_SLEEVE_ALPACA_SECRET_KEY: ${{ secrets.MULTI_SLEEVE_ALPACA_API_SECRET_KEY }}
          HEDGE_ALPACA_API_KEY: ${{ secrets.HEDGE_ALPACA_API_KEY }}
          HEDGE_ALPACA_SECRET_KEY: ${{ secrets.HEDGE_ALPACA_SECRET_KEY }}
          HEDGE_ALPACA_API_SECRET_KEY: ${{ secrets.HEDGE_ALPACA_SECRET_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: poetry run python fund_weekly_digest.py

      - name: Save satellite sleeve data
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/hedge
            data/options_income
            data/congressional
            data/macro_etf
            data/crypto
            data/fund
            data/daily_snapshots/multi_sleeve
          key: satellite-data-${{ github.repository }}-main

      - name: Save daily snapshots
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/daily_snapshots
          key: daily-snapshots-${{ github.repository }}-main
