# Single paper account (Beat SPY). All Alpaca workflows share ALPACA_* env vars.
# Satellite sleeves disabled until separate accounts are provisioned again.
workflows:
  weekly-scan:
    broker: alpaca
    env_prefix: ALPACA
    snapshot_subdir: stock
    data_dir: data/performance
    account_group: primary
    enabled: true
    label: Beat SPY equity book

  biotech-catalyst:
    broker: alpaca
    env_prefix: ALPACA
    snapshot_subdir: biotech
    data_dir: data/biotech
    account_group: primary
    enabled: false
    label: Biotech catalyst (disabled — single account)

  hedge-weekly:
    broker: alpaca
    env_prefix: ALPACA
    snapshot_subdir: multi_sleeve
    data_dir: data/hedge
    account_group: primary
    enabled: false
    label: Beta hedge overlay (disabled)

  options-income:
    broker: alpaca
    env_prefix: ALPACA
    snapshot_subdir: multi_sleeve
    data_dir: data/options_income
    account_group: primary
    enabled: false
    label: Options vol income (disabled)

  congressional:
    broker: alpaca
    env_prefix: ALPACA
    snapshot_subdir: multi_sleeve
    data_dir: data/congressional
    account_group: primary
    enabled: false
    label: Congressional trades (disabled)

  macro-etf:
    broker: alpaca
    env_prefix: ALPACA
    snapshot_subdir: multi_sleeve
    data_dir: data/macro_etf
    account_group: primary
    enabled: false
    label: Macro ETF rotation (disabled)

  crypto-weekly:
    broker: alpaca
    env_prefix: ALPACA
    snapshot_subdir: multi_sleeve
    data_dir: data/crypto
    account_group: primary
    enabled: false
    label: Crypto momentum (disabled)

  forex-weekly:
    broker: ibkr
    env_prefix: FOREX_IBKR
    snapshot_subdir: forex
    data_dir: data/forex
    account_group: forex
    enabled: false
    label: Forex G10 momentum

  futures-trend:
    broker: ibkr
    env_prefix: FUTURES_IBKR
    snapshot_subdir: futures
    data_dir: data/futures
    account_group: futures
    enabled: false
    label: Futures trend CTA

  commodities:
    broker: ibkr
    env_prefix: COMMODITIES_IBKR
    snapshot_subdir: commodities
    data_dir: data/commodities
    account_group: commodities
    enabled: false
    label: Commodities momentum
